<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>op-art</title>
    <script src="../require.js"></script>
    <link href="../op_art.css" rel="stylesheet" />
  </head>

  <body>
    <div id="plot"></div>

    <script>
      require.config({
        baseUrl: "..",
        paths: {
          d3: "https://d3js.org/d3.v5.min",
        },
      });
      require(["op_art"], function (op_art) {
        const arrs = [
          {
            id: 0,
            kind: "i",
            ndim: 1,
            shape: [3],
            cells: [
              {
                id: "0_0",
                index: [0],
                value: 0,
                sources: null,
              },
              {
                id: "0_1",
                index: [1],
                value: 1,
                sources: null,
              },
              {
                id: "0_2",
                index: [2],
                value: 2,
                sources: null,
              },
            ],
          },
          {
            id: 1,
            kind: "f",
            ndim: 2,
            shape: [3, 2],
            cells: [
              {
                id: "1_0",
                index: [0, 0],
                value: 1.0,
                sources: null,
              },
              {
                id: "1_1",
                index: [0, 1],
                value: 1.0,
                sources: null,
              },
              {
                id: "1_2",
                index: [1, 0],
                value: 1.0,
                sources: null,
              },
              {
                id: "1_3",
                index: [1, 1],
                value: 1.0,
                sources: null,
              },
              {
                id: "1_4",
                index: [2, 0],
                value: 1.0,
                sources: null,
              },
              {
                id: "1_5",
                index: [2, 1],
                value: 1.0,
                sources: null,
              },
            ],
          },
          {
            id: 1,
            kind: "f",
            ndim: 2,
            shape: [3, 2],
            cells: [
              {
                id: "1_0",
                index: [0, 0],
                value: 1.0,
                sources: null,
              },
              {
                id: "1_1",
                index: [0, 1],
                value: 0.0,
                sources: ["0_0"],
              },
              {
                id: "1_2",
                index: [1, 0],
                value: 1.0,
                sources: null,
              },
              {
                id: "1_3",
                index: [1, 1],
                value: 1.0,
                sources: ["0_1"],
              },
              {
                id: "1_4",
                index: [2, 0],
                value: 1.0,
                sources: null,
              },
              {
                id: "1_5",
                index: [2, 1],
                value: 2.0,
                sources: ["0_2"],
              },
            ],
          },
        ];
        const lines = [
          "a = xp.arange(3)",
          "b = xp.ones((3, 2))",
          "b[:, 1] = a",
        ];

        op_art.visualize("#plot", arrs, lines, 1500, true, "TB", true);
      });
    </script>
  </body>
</html>
